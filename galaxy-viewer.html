<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Galaxy Model Viewer</title>
  <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; color: #0f0; font-family: 'DotGothic16', monospace; overflow: hidden; }
    canvas { display: block; width: 100vw; height: 100vh; }
    #hud {
      position: fixed; top: 12px; left: 12px;
      font-size: 13px; line-height: 1.6;
      text-shadow: 0 0 8px #000, 0 0 16px #000;
      pointer-events: none; z-index: 10;
    }
    #controls {
      position: fixed; bottom: 12px; left: 12px;
      font-size: 12px; line-height: 2.0;
      text-shadow: 0 0 8px #000;
      z-index: 10; max-width: 360px;
    }
    #controls label { display: block; cursor: pointer; }
    #controls input[type=range] { width: 140px; vertical-align: middle; }
    .btn {
      background: rgba(0,255,0,0.1); border: 1px solid #0f0; color: #0f0;
      font-family: inherit; font-size: 12px; padding: 4px 10px; cursor: pointer;
      margin: 2px;
    }
    .btn:hover { background: rgba(0,255,0,0.25); }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <canvas id="lumCanvas" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); z-index:5; image-rendering:pixelated;"></canvas>
  <div id="hud"></div>
  <div id="status" style="position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:18px;z-index:20;">GENERATING...</div>
  <div id="controls" style="display:none;">
    <!-- Luminosity controls (default view) -->
    <label>Stretch: <input type="range" id="lumStretch" min="10" max="5000" step="10" value="500"> <span id="lumStretchVal">500</span></label>
    <label>Gamma: <input type="range" id="lumGamma" min="0.2" max="1.0" step="0.05" value="0.50"> <span id="lumGammaVal">0.50</span></label>
    <label>Dust: <input type="range" id="lumDust" min="0" max="1.0" step="0.05" value="0.50"> <span id="lumDustVal">0.50</span></label>
    <label>Noise: <input type="range" id="lumNoise" min="0" max="1.0" step="0.05" value="0.40"> <span id="lumNoiseVal">0.40</span></label>
    <label>Extent: <input type="range" id="lumExtent" min="0.5" max="22" step="0.5" value="22"> <span id="lumExtentVal">22</span> kpc</label>
    <label>Resolution: <input type="range" id="lumRes" min="256" max="1024" step="128" value="512"> <span id="lumResVal">512</span></label>
    <div style="margin-top: 6px;">
      <button class="btn" id="lumExport">Export PNG</button>
      <button class="btn" id="toggleOverlay">Sector Overlay: OFF</button>
      <button class="btn" id="toggleParticleView">Particle View</button>
      <button class="btn" id="saveSettings">Save Settings</button>
      <button class="btn" id="loadSettings">Load Settings</button>
      <button class="btn" id="dumpSettings">Copy Settings</button>
    </div>
    <!-- Particle controls (hidden by default, shown via Particle View button) -->
    <div id="particleControls" style="display:none; margin-top: 6px; border-top: 1px solid #0a0; padding-top: 4px;">
      <div style="color:#0a0; font-size:11px;">── PARTICLE VIEW ──</div>
      <label>Star Brightness: <input type="range" id="bright" min="0" max="5.0" step="0.05" value="1.00"> <span id="brightVal">1.00</span></label>
      <label>Star Size: <input type="range" id="scale" min="0.01" max="2.0" step="0.01" value="0.30"> <span id="scaleVal">0.30</span></label>
      <label>Spread: <input type="range" id="spread" min="1.0" max="30.0" step="0.5" value="3.0"> <span id="spreadVal">3.0</span></label>
      <label>Glow: <input type="range" id="glow" min="0" max="3.0" step="0.01" value="0.30"> <span id="glowVal">0.30</span></label>
      <label>Dust: <input type="range" id="dust" min="0" max="2.0" step="0.01" value="0.50"> <span id="dustVal">0.50</span></label>
      <label>Dither: <input type="range" id="dither" min="0" max="1.5" step="0.01" value="0.0"> <span id="ditherVal">0.0</span></label>
      <label>Near Fade: <input type="range" id="nearfade" min="0" max="15.0" step="0.5" value="0.0"> <span id="nearfadeVal">0.0</span> kpc</label>
      <label>Choke: <input type="range" id="choke" min="1.0" max="15.0" step="0.5" value="15.0"> <span id="chokeVal">15.0</span> kpc</label>
      <label>Particles: <input type="range" id="pcount" min="100000" max="2000000" step="100000" value="600000"> <span id="pcountVal">600K</span></label>
      <button class="btn" id="viewTop">Top-Down</button>
      <button class="btn" id="viewEdge">Edge-On</button>
      <button class="btn" id="viewAngled">Angled</button>
      <button class="btn" id="exportTop">Export Particle View</button>
      <button class="btn" id="exportNav">Export Nav Map</button>
    </div>
  </div>
  <script type="module">
    import * as THREE from 'three';
    import { GalacticMap } from './src/generation/GalacticMap.js';
    import { GalacticSectors } from './src/generation/GalacticSectors.js';
    import { MilkyWayModel } from './src/generation/MilkyWayModel.js';
    import { MilkyWay } from './src/objects/MilkyWay.js';
    import { GalaxyCloud } from './src/objects/GalaxyCloud.js';
    import { GalaxyLuminosityRenderer } from './src/rendering/GalaxyLuminosityRenderer.js';

    const canvas = document.getElementById('canvas');
    const hudEl = document.getElementById('hud');
    const statusEl = document.getElementById('status');
    const controlsEl = document.getElementById('controls');

    const renderer = new THREE.WebGLRenderer({ canvas, antialias: false, preserveDrawingBuffer: true });
    renderer.setPixelRatio(window.devicePixelRatio || 2);
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setClearColor(0x000000);
    // Sort objects by renderOrder so dust renders after glow+particles
    renderer.sortObjects = true;

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.01, 500);


    const galacticMap = new GalacticMap('well-dipper-galaxy-1');
    const sectors = new GalacticSectors(galacticMap);
    let milkyWay = null;

    // ── Sector overlay (togglable) ──
    const overlayGroup = new THREE.Group();
    overlayGroup.visible = false;
    scene.add(overlayGroup);

    function buildOverlay() {
      // Sector grid lines
      const allSectors = sectors.getSectorsInBounds(-22, 22, -22, 22);
      const lineMat = new THREE.LineBasicMaterial({ color: 0x3366aa, transparent: true, opacity: 0.25 });
      for (const s of allSectors) {
        const geo = new THREE.BufferGeometry();
        const y = 0.01; // just above galactic plane
        const verts = new Float32Array([
          s.minX, y, s.minZ,  s.maxX, y, s.minZ,
          s.maxX, y, s.minZ,  s.maxX, y, s.maxZ,
          s.maxX, y, s.maxZ,  s.minX, y, s.maxZ,
          s.minX, y, s.maxZ,  s.minX, y, s.minZ,
        ]);
        geo.setAttribute('position', new THREE.Float32BufferAttribute(verts, 3));
        overlayGroup.add(new THREE.LineSegments(geo, lineMat));
      }

      // Player position (solar neighborhood)
      const playerGeo = new THREE.SphereGeometry(0.2, 8, 8);
      const playerMat = new THREE.MeshBasicMaterial({ color: 0x00ff88 });
      const playerMarker = new THREE.Mesh(playerGeo, playerMat);
      playerMarker.position.set(GalacticMap.SOLAR_R, 0.05, GalacticMap.SOLAR_Z);
      overlayGroup.add(playerMarker);

      // Galaxy center
      const centerGeo = new THREE.SphereGeometry(0.15, 8, 8);
      const centerMat = new THREE.MeshBasicMaterial({ color: 0xffff00 });
      const centerMarker = new THREE.Mesh(centerGeo, centerMat);
      centerMarker.position.set(0, 0.05, 0);
      overlayGroup.add(centerMarker);

      // Major arm tip markers
      const R_TIP = 13;
      for (const arm of galacticMap.arms) {
        const theta = arm.offset + galacticMap.pitchK * Math.log(R_TIP / 4.0);
        const x = R_TIP * Math.cos(theta);
        const z = R_TIP * Math.sin(theta);
        const color = arm.isMajor ? 0xff3333 : 0xffaa33;
        const size = arm.isMajor ? 0.25 : 0.12;
        const geo = new THREE.SphereGeometry(size, 8, 8);
        const mat = new THREE.MeshBasicMaterial({ color });
        const marker = new THREE.Mesh(geo, mat);
        marker.position.set(x, 0.05, z);
        overlayGroup.add(marker);
      }

      // Extent circle at 15 kpc (galaxy radius)
      const circlePts = [];
      for (let i = 0; i <= 64; i++) {
        const a = (i / 64) * Math.PI * 2;
        circlePts.push(new THREE.Vector3(15 * Math.cos(a), 0.01, 15 * Math.sin(a)));
      }
      const circleGeo = new THREE.BufferGeometry().setFromPoints(circlePts);
      const circleMat = new THREE.LineBasicMaterial({ color: 0x444444, transparent: true, opacity: 0.4 });
      overlayGroup.add(new THREE.Line(circleGeo, circleMat));

      // ±22 kpc extent box (nav map boundary)
      const boxVerts = new Float32Array([
        -22, 0.01, -22,  22, 0.01, -22,
        22, 0.01, -22,   22, 0.01, 22,
        22, 0.01, 22,   -22, 0.01, 22,
        -22, 0.01, 22,  -22, 0.01, -22,
      ]);
      const boxGeo = new THREE.BufferGeometry();
      boxGeo.setAttribute('position', new THREE.Float32BufferAttribute(boxVerts, 3));
      const boxMat = new THREE.LineBasicMaterial({ color: 0x666666, transparent: true, opacity: 0.3 });
      overlayGroup.add(new THREE.LineSegments(boxGeo, boxMat));
    }
    buildOverlay();

    document.getElementById('toggleOverlay').onclick = () => {
      overlayGroup.visible = !overlayGroup.visible;
      document.getElementById('toggleOverlay').textContent = 'Sector Overlay: ' + (overlayGroup.visible ? 'ON' : 'OFF');
    };

    // ── Luminosity 2D view ──
    const lumRenderer = new GalaxyLuminosityRenderer(galacticMap);
    const lumCanvas = document.getElementById('lumCanvas');
    let lumViewActive = true; // default ON

    function renderLumView() {
      const stretch = parseFloat(document.getElementById('lumStretch').value);
      const gamma = parseFloat(document.getElementById('lumGamma').value);
      const dust = parseFloat(document.getElementById('lumDust').value);
      const noise = parseFloat(document.getElementById('lumNoise').value);
      const extent = parseFloat(document.getElementById('lumExtent').value);
      const res = parseInt(document.getElementById('lumRes').value);

      console.log('Rendering luminosity view: extent=' + extent + ' res=' + res + ' stretch=' + stretch);
      const t0 = performance.now();
      const result = lumRenderer.render(0, 0, extent, res, {
        stretch, gamma, dustStrength: dust, noiseStrength: noise,
      });
      console.log('Done in', (performance.now() - t0).toFixed(0), 'ms');

      // Display on overlay canvas
      lumCanvas.width = res;
      lumCanvas.height = res;
      // Display as a square that fits the viewport
      const viewSize = Math.min(window.innerWidth, window.innerHeight);
      lumCanvas.style.width = viewSize + 'px';
      lumCanvas.style.height = viewSize + 'px';
      const ctx = lumCanvas.getContext('2d');
      // Black background — transparent pixels in the luminosity image
      // become dark space, bright pixels glow on top
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, res, res);
      ctx.drawImage(result, 0, 0);
    }

    // Luminosity view starts ON
    lumCanvas.style.display = 'block';
    renderLumView();

    document.getElementById('toggleParticleView').onclick = () => {
      const pc = document.getElementById('particleControls');
      const showing = pc.style.display !== 'none';
      pc.style.display = showing ? 'none' : 'block';
      // When showing particle view, hide luminosity overlay so you can see particles
      if (!showing) {
        lumViewActive = false;
        lumCanvas.style.display = 'none';
      } else {
        lumViewActive = true;
        lumCanvas.style.display = 'block';
        renderLumView();
      }
    };

    // Live sliders — auto-render on release
    for (const id of ['lumStretch', 'lumGamma', 'lumDust', 'lumNoise', 'lumExtent', 'lumRes']) {
      const el = document.getElementById(id);
      el.oninput = (e) => {
        const val = parseFloat(e.target.value);
        document.getElementById(id + 'Val').textContent = id === 'lumRes' ? val : val.toFixed(id === 'lumStretch' ? 0 : 2);
      };
      el.onchange = () => { if (lumViewActive) renderLumView(); };
    }

    document.getElementById('lumExport').onclick = () => {
      lumCanvas.toBlob((blob) => {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'galaxy-luminosity.png';
        a.click();
      });
    };

    function getSliderValues() {
      return {
        brightness: parseFloat(document.getElementById('bright').value),
        scale: parseFloat(document.getElementById('scale').value),
        glowBrightness: parseFloat(document.getElementById('glow').value),
        dustOpacity: parseFloat(document.getElementById('dust').value),
        count: parseInt(document.getElementById('pcount').value),
      };
    }

    function build(count) {
      const sv = getSliderValues();
      if (count !== undefined) sv.count = count;

      if (milkyWay) { milkyWay.removeFrom(scene); milkyWay.dispose(); }
      statusEl.style.display = 'block';
      statusEl.textContent = `GENERATING ${(sv.count/1000).toFixed(0)}K PARTICLES...`;

      setTimeout(() => {
        const t0 = performance.now();
        const data = MilkyWayModel.generate(galacticMap, { totalParticles: sv.count });
        const ms = performance.now() - t0;

        milkyWay = new MilkyWay(data, {
          brightness: sv.brightness,
          scale: sv.scale,
          armData: { arms: galacticMap.arms, pitchK: galacticMap.pitchK },
          glowBrightness: sv.glowBrightness,
          radius: 15,
        });
        // Set initial dust from slider
        milkyWay.setDustOpacity(sv.dustOpacity);
        milkyWay.addTo(scene);

        statusEl.style.display = 'none';
        controlsEl.style.display = 'block';
        console.log(`${(sv.count/1000).toFixed(0)}K particles in ${ms.toFixed(0)}ms`);
      }, 16);
    }

    build();

    // ── Galaxy Cloud (Nebula-style rendering) ──
    const galaxyCloud = new GalaxyCloud(
      { arms: galacticMap.arms, pitchK: galacticMap.pitchK, barAngle: galacticMap.barAngle },
      { radius: 15, layerCount: 7, opacity: 0.35 }
    );
    galaxyCloud.addTo(scene);

    // ── Camera: always orbits galaxy center (0,0,0) ──
    let isDragging = false;
    let orbitTheta = Math.PI / 4, orbitPhi = Math.PI / 4, orbitRadius = 30;
    let lastMX = 0, lastMY = 0;

    function camUpdate() {
      const sp = Math.sin(orbitPhi);
      camera.position.set(
        orbitRadius * sp * Math.cos(orbitTheta),
        orbitRadius * Math.cos(orbitPhi),
        orbitRadius * sp * Math.sin(orbitTheta),
      );
      camera.lookAt(0, 0, 0);
    }
    camUpdate();

    canvas.addEventListener('mousedown', (e) => {
      isDragging = true;
      lastMX = e.clientX; lastMY = e.clientY;
    });
    window.addEventListener('mouseup', () => { isDragging = false; });
    window.addEventListener('mousemove', (e) => {
      if (!isDragging) return;
      const dx = e.clientX - lastMX, dy = e.clientY - lastMY;
      lastMX = e.clientX; lastMY = e.clientY;
      orbitTheta -= dx * 0.005;
      orbitPhi = Math.max(0.05, Math.min(Math.PI - 0.05, orbitPhi - dy * 0.005));
      camUpdate();
    });
    canvas.addEventListener('wheel', (e) => {
      e.preventDefault();
      orbitRadius *= e.deltaY > 0 ? 1.1 : 0.9;
      orbitRadius = Math.max(0.5, Math.min(200, orbitRadius));
      camUpdate();
    }, { passive: false });

    // ── Views ──
    function setView(th, ph, r) {
      orbitTheta = th; orbitPhi = ph; orbitRadius = r; camUpdate();
    }
    document.getElementById('viewTop').onclick = () => setView(0, 0.05, 25);
    document.getElementById('viewEdge').onclick = () => setView(0, Math.PI/2 - 0.05, 35);
    document.getElementById('viewAngled').onclick = () => setView(Math.PI/4, Math.PI/4, 30);

    // ── Sliders ──
    document.getElementById('bright').oninput = (e) => {
      const v = parseFloat(e.target.value);
      document.getElementById('brightVal').textContent = v.toFixed(2);
      if (milkyWay) milkyWay.setBrightness(v);
    };
    document.getElementById('scale').oninput = (e) => {
      const v = parseFloat(e.target.value);
      document.getElementById('scaleVal').textContent = v.toFixed(2);
      if (milkyWay) milkyWay.setScale(v);
    };
    document.getElementById('spread').oninput = (e) => {
      const v = parseFloat(e.target.value);
      document.getElementById('spreadVal').textContent = v.toFixed(1);
      if (milkyWay) milkyWay.setSpread(v);
    };
    document.getElementById('glow').oninput = (e) => {
      const v = parseFloat(e.target.value);
      document.getElementById('glowVal').textContent = v.toFixed(2);
      if (milkyWay) milkyWay.setGlowBrightness(v);
    };
    document.getElementById('dither').oninput = (e) => {
      const v = parseFloat(e.target.value);
      document.getElementById('ditherVal').textContent = v.toFixed(2);
      if (milkyWay) milkyWay.setDither(v);
    };
    document.getElementById('nearfade').oninput = (e) => {
      const v = parseFloat(e.target.value);
      document.getElementById('nearfadeVal').textContent = v.toFixed(1);
      if (milkyWay) milkyWay.setNearFade(v);
    };
    document.getElementById('choke').oninput = (e) => {
      const v = parseFloat(e.target.value);
      document.getElementById('chokeVal').textContent = v.toFixed(1);
      if (milkyWay) milkyWay.setChoke(v);
    };
    document.getElementById('dust').oninput = (e) => {
      const v = parseFloat(e.target.value);
      document.getElementById('dustVal').textContent = v.toFixed(2);
      if (milkyWay) milkyWay.setDustOpacity(v);
    };
    // Particle count: auto-rebuild on release
    document.getElementById('pcount').onchange = (e) => {
      const count = parseInt(e.target.value);
      document.getElementById('pcountVal').textContent = (count/1000).toFixed(0) + 'K';
      build(count);
    };
    document.getElementById('pcount').oninput = (e) => {
      document.getElementById('pcountVal').textContent = (parseInt(e.target.value)/1000).toFixed(0) + 'K';
    };

    // ── Export: saves exactly what's on screen ──
    document.getElementById('exportTop').onclick = () => {
      renderer.render(scene, camera);
      canvas.toBlob((blob) => {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'galaxy-export.png';
        a.click();
      });
    };

    // ── Nav Map Export: orthographic top-down, ±22 kpc, 1024×1024 ──
    // Matches NavComputer._galaxyImageExtent exactly
    document.getElementById('exportNav').onclick = () => {
      const SIZE = 1024;
      const EXTENT = 22; // kpc half-width — must match NavComputer._galaxyImageExtent
      const ow = renderer.domElement.width, oh = renderer.domElement.height;

      renderer.setSize(SIZE, SIZE);
      const ortho = new THREE.OrthographicCamera(-EXTENT, EXTENT, EXTENT, -EXTENT, 0.01, 200);
      ortho.position.set(0, 50, 0);
      ortho.up.set(0, 0, -1);
      ortho.lookAt(0, 0, 0);
      ortho.updateProjectionMatrix();

      renderer.render(scene, ortho);
      canvas.toBlob((blob) => {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'galaxy-nav.png';
        a.click();

        // Restore
        renderer.setSize(ow, oh);
        camera.aspect = ow / oh;
        camera.updateProjectionMatrix();
        camUpdate();
      });
    };

    // ── Save / Load settings via localStorage ──
    const SLIDER_IDS = ['bright', 'scale', 'spread', 'glow', 'dust', 'dither', 'nearfade', 'choke', 'pcount',
      'lumStretch', 'lumGamma', 'lumDust', 'lumNoise', 'lumExtent', 'lumRes'];
    const STORAGE_KEY = 'galaxy-viewer-settings';

    document.getElementById('saveSettings').onclick = () => {
      const settings = {};
      for (const id of SLIDER_IDS) {
        settings[id] = document.getElementById(id).value;
      }
      settings.camera = { theta: orbitTheta, phi: orbitPhi, radius: orbitRadius };
      localStorage.setItem(STORAGE_KEY, JSON.stringify(settings));
      console.log('Settings saved');
    };

    document.getElementById('dumpSettings').onclick = () => {
      const settings = {};
      for (const id of SLIDER_IDS) settings[id] = document.getElementById(id).value;
      settings.camera = { theta: orbitTheta, phi: orbitPhi, radius: orbitRadius };
      const text = JSON.stringify(settings, null, 2);
      navigator.clipboard.writeText(text).then(() => {
        console.log('Settings copied to clipboard');
      }).catch(() => {
        console.log('SETTINGS:', text);
      });
    };

    document.getElementById('loadSettings').onclick = () => {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) { console.log('No saved settings'); return; }
      const settings = JSON.parse(raw);

      // Restore sliders and fire their handlers
      for (const id of SLIDER_IDS) {
        if (settings[id] !== undefined) {
          const el = document.getElementById(id);
          el.value = settings[id];
          el.dispatchEvent(new Event('input'));
        }
      }
      // Particle count needs a rebuild
      if (settings.pcount) {
        document.getElementById('pcount').dispatchEvent(new Event('change'));
      }
      // Restore camera
      if (settings.camera) {
        orbitTheta = settings.camera.theta;
        orbitPhi = settings.camera.phi;
        orbitRadius = settings.camera.radius;
        camUpdate();
      }
      console.log('Settings loaded');
    };

    // Auto-load on startup if settings exist
    if (localStorage.getItem(STORAGE_KEY)) {
      // Delay to let the initial build finish first
      setTimeout(() => document.getElementById('loadSettings').click(), 500);
    }

    window.onresize = () => {
      renderer.setSize(window.innerWidth, window.innerHeight);
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
    };

    // ── Render loop ──
    let lastTime = 0;
    function animate(time) {
      requestAnimationFrame(animate);
      const dt = Math.min((time - lastTime) / 1000, 0.1);
      lastTime = time;
      if (milkyWay) milkyWay.update(dt);
      galaxyCloud.update(dt);

      renderer.render(scene, camera);
      hudEl.innerHTML =
        `GALAXY MODEL VIEWER<br>` +
        `Particles: ${milkyWay ? milkyWay.data.particleCount.toLocaleString() : '...'}<br>` +
        `Distance: ${orbitRadius.toFixed(1)} kpc`;
    }
    animate(0);
  </script>
</body>
</html>
