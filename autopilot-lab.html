<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Autopilot Lab — lhokon tuning + general nav</title>
  <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      background: #000;
      color: #0f0;
      font-family: 'DotGothic16', monospace;
      overflow: hidden;
    }
    canvas { display: block; width: 100vw; height: 100vh; }

    #hud {
      position: fixed; top: 12px; left: 12px;
      font-size: 13px; line-height: 1.7;
      text-shadow: 0 0 8px #000, 0 0 16px #000;
      pointer-events: none; z-index: 10;
      max-width: 380px;
    }
    #hud .label { color: #088; }
    #hud .phase-LHOKON { color: #ff0; font-weight: bold; }
    #hud .phase-CRUISE { color: #0f0; }
    #hud .phase-APPROACH { color: #f80; }
    #hud .phase-STATION-A { color: #0ff; }
    #hud .phase-IDLE { color: #444; }

    #panel {
      position: fixed; top: 12px; right: 12px;
      background: rgba(0, 0, 0, 0.78);
      border: 1px solid rgba(0, 255, 0, 0.4);
      padding: 12px 14px;
      font-size: 12px; line-height: 1.5;
      z-index: 10;
      width: 320px;
      border-radius: 3px;
    }
    #panel h3 { font-size: 14px; margin-bottom: 8px; color: #0f0; }
    #panel section { margin: 10px 0; padding: 6px 0; border-top: 1px dashed rgba(0,255,0,0.25); }
    #panel section:first-of-type { border-top: none; }
    #panel label { display: block; margin: 6px 0 2px; color: #088; }
    #panel label .v { color: #0f0; float: right; }
    #panel input[type=range] { width: 100%; }
    #panel select, #panel button {
      width: 100%; background: #000; color: #0f0;
      border: 1px solid rgba(0,255,0,0.4); padding: 5px 8px;
      font-family: inherit; font-size: 12px; cursor: pointer;
    }
    #panel button:hover { background: rgba(0,80,0,0.4); }
    #panel button.active { background: rgba(0,150,0,0.5); border-color: #0f0; }
    #panel .row { display: flex; gap: 6px; }
    #panel .row > * { flex: 1; }
    #panel .check { display: flex; align-items: center; gap: 6px; color: #0a0; }
    #panel .check input { margin: 0; }

    #hint {
      position: fixed; bottom: 12px; left: 12px;
      font-size: 11px; color: #066;
      max-width: 600px; line-height: 1.5;
      z-index: 10;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="hud">loading…</div>
  <div id="panel">
    <h3>Autopilot Lab</h3>

    <section>
      <label>Mode</label>
      <div class="row">
        <button id="mode-auto" class="active">Auto Tour</button>
        <button id="mode-manual">Manual Click</button>
      </div>
    </section>

    <section>
      <label>lhokon dot threshold <span class="v" id="dot-v">0.9999</span></label>
      <input type="range" id="dot" min="0" max="100" value="50">
      <label>lhokon timeout (s) <span class="v" id="timeout-v">1.50</span></label>
      <input type="range" id="timeout" min="0.30" max="3.00" step="0.05" value="1.50">
      <label>ease curve</label>
      <select id="ease">
        <option value="smoothstep">smoothstep — t²(3−2t) (current production)</option>
        <option value="cubic-out">cubic ease-out — 1−(1−t)³</option>
        <option value="sin">sinusoidal — ½(1−cos πt)</option>
        <option value="quintic">quintic smoothstep — t³(6t²−15t+10)</option>
        <option value="linear">linear — t</option>
      </select>
    </section>

    <section>
      <label class="check"><input type="checkbox" id="show-old" checked> show old-body marker (red sphere during lhokon)</label>
      <label class="check"><input type="checkbox" id="show-lines" checked> show direction lines (yellow=look, red=old-dir, green=new-dir)</label>
      <label class="check"><input type="checkbox" id="orbit-bodies"> bodies orbit the sun (default off — static)</label>
    </section>

    <section>
      <button id="reset">Reset</button>
    </section>
  </div>

  <div id="hint">
    <strong>Auto Tour</strong>: cycles through bodies indefinitely. Lhokon fires between each leg.<br>
    <strong>Manual Click</strong>: click any body to commit a burn. Same lhokon machinery as autopilot tour.<br>
    Tweak the curve / threshold / timeout sliders LIVE — no reload needed. Reset clears any in-flight motion.
  </div>

<script type="module">
import * as THREE from 'three';
import { AutopilotMotion } from './src/auto/AutopilotMotion.js';
import { CameraChoreographer } from './src/auto/CameraChoreographer.js';

// ── Scene setup ──────────────────────────────────────────────────────
const canvas = document.getElementById('canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
addEventListener('resize', () => {
  renderer.setSize(window.innerWidth, window.innerHeight);
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
});

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 1, 50000);

scene.add(new THREE.AmbientLight(0xffffff, 0.35));
const sunLight = new THREE.PointLight(0xffeebb, 1.2, 0, 0);
scene.add(sunLight);

// Starfield backdrop (just for spatial reference).
{
  const starGeo = new THREE.BufferGeometry();
  const N = 1500;
  const pts = new Float32Array(N * 3);
  for (let i = 0; i < N; i++) {
    const r = 8000 + Math.random() * 4000;
    const t = Math.random() * Math.PI * 2;
    const p = (Math.random() - 0.5) * Math.PI;
    pts[i*3]   = r * Math.cos(p) * Math.cos(t);
    pts[i*3+1] = r * Math.sin(p);
    pts[i*3+2] = r * Math.cos(p) * Math.sin(t);
  }
  starGeo.setAttribute('position', new THREE.BufferAttribute(pts, 3));
  scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0x888888, size: 2, sizeAttenuation: false })));
}

// ── Bodies ───────────────────────────────────────────────────────────
// Each body is a THREE.Mesh with userData.bodyRadius (autopilotMotion
// reads .position; bodyRadius is passed via beginMotion). The "parent"
// reference + orbital params drive optional orbital motion.
const bodies = [];
function makeBody({ name, radius, color, parent = null, orbitRadius = 0, orbitAngle = 0, orbitSpeed = 0, ringColor = null }) {
  const mesh = new THREE.Mesh(
    new THREE.SphereGeometry(radius, 32, 32),
    new THREE.MeshStandardMaterial({ color, emissive: color, emissiveIntensity: 0.15, roughness: 0.9 }),
  );
  mesh.userData.name = name;
  mesh.userData.bodyRadius = radius;
  mesh.userData.parent = parent;
  mesh.userData.orbitRadius = orbitRadius;
  mesh.userData.orbitAngle = orbitAngle;
  mesh.userData.orbitSpeed = orbitSpeed;
  scene.add(mesh);
  bodies.push(mesh);

  if (ringColor) {
    const ring = new THREE.Mesh(
      new THREE.RingGeometry(radius * 1.5, radius * 2.4, 64),
      new THREE.MeshBasicMaterial({ color: ringColor, side: THREE.DoubleSide, transparent: true, opacity: 0.5 }),
    );
    ring.rotation.x = -Math.PI / 2;
    mesh.add(ring);
  }
  return mesh;
}

const sun     = makeBody({ name: 'Sun',    radius: 100, color: 0xffcc55 });
const planetA = makeBody({ name: 'Mercury-ish', radius: 28, color: 0xb87a4a, parent: sun, orbitRadius: 800,  orbitAngle: 0.0,        orbitSpeed: 0.08 });
const planetB = makeBody({ name: 'Earth-ish',   radius: 50, color: 0x3877c8, parent: sun, orbitRadius: 1700, orbitAngle: Math.PI*0.7, orbitSpeed: 0.04 });
const moonOfB = makeBody({ name: 'Moon',        radius: 14, color: 0xaaaaaa, parent: planetB, orbitRadius: 130, orbitAngle: 0.0, orbitSpeed: 0.6 });
const planetC = makeBody({ name: 'Saturn-ish',  radius: 90, color: 0xddaa66, parent: sun, orbitRadius: 3600, orbitAngle: Math.PI*1.4, orbitSpeed: 0.015, ringColor: 0xeebb88 });
const planetD = makeBody({ name: 'Neptune-ish', radius: 64, color: 0x6688dd, parent: sun, orbitRadius: 5200, orbitAngle: Math.PI*0.3, orbitSpeed: 0.008 });

// Initial positions (orbit angles applied even when orbital motion is off).
function placeBodies() {
  for (const b of bodies) {
    const p = b.userData.parent;
    if (!p) { b.position.set(0, 0, 0); continue; }
    const r = b.userData.orbitRadius;
    const a = b.userData.orbitAngle;
    b.position.set(p.position.x + r * Math.cos(a), p.position.y, p.position.z + r * Math.sin(a));
  }
}
placeBodies();

// ── Visual aids: old-body marker + direction lines ───────────────────
const oldBodyMarker = new THREE.Mesh(
  new THREE.SphereGeometry(15, 16, 16),
  new THREE.MeshBasicMaterial({ color: 0xff3333, wireframe: true, transparent: true, opacity: 0.85 }),
);
oldBodyMarker.visible = false;
scene.add(oldBodyMarker);

function makeLine(color) {
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(6), 3));
  return new THREE.Line(geo, new THREE.LineBasicMaterial({ color, transparent: true, opacity: 0.85 }));
}
const lineLook = makeLine(0xffff00); // current camera look (yellow)
const lineOld  = makeLine(0xff3333); // old-body direction (red)
const lineNew  = makeLine(0x33ff33); // new-body direction (green)
[lineLook, lineOld, lineNew].forEach(l => { l.visible = false; scene.add(l); });

function setLineEndpoints(line, fromV, toV) {
  const a = line.geometry.attributes.position.array;
  a[0] = fromV.x; a[1] = fromV.y; a[2] = fromV.z;
  a[3] = toV.x;   a[4] = toV.y;   a[5] = toV.z;
  line.geometry.attributes.position.needsUpdate = true;
  line.visible = true;
}

// ── Ship + autopilot wiring ──────────────────────────────────────────
// Stub Ship — just satisfies setOrientation contract. autopilotMotion
// writes ship.forward; only consumer in production is shake (skipped).
const ship = {
  forward: new THREE.Vector3(0, 0, -1),
  up: new THREE.Vector3(0, 1, 0),
  setOrientation(dir) { this.forward.copy(dir); },
};

const motion = new AutopilotMotion();

// CameraChoreographer needs a shipChoreographer-like object exposing
// `currentPhase`. We forward to AutopilotMotion's _phase since the V1
// §A4 path doesn't actually consume the value (it switches on
// CameraMode, with _ship set → V1 passthrough of motionFrame.cameraLookDir).
const shipChoreographerStub = { get currentPhase() { return motion._phase; } };
const cameraChoreographer = new CameraChoreographer(shipChoreographerStub, null, null, null);
cameraChoreographer.setShip(ship);

// Initial camera position — viewing the system from off-axis.
camera.position.set(2500, 600, 2500);
camera.lookAt(0, 0, 0);

// ── Mode + tour state ────────────────────────────────────────────────
let mode = 'auto';
let tourQueue = [];
let tourIndex = 0;
let oldBodyForLhokon = null;
let bodiesOrbit = false;

function shuffleQueue() {
  // Visit each body once in a randomized order, excluding the sun for
  // the tour entry and including it at a random insertion point.
  const visit = bodies.filter(b => b !== sun);
  for (let i = visit.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [visit[i], visit[j]] = [visit[j], visit[i]];
  }
  // Insert sun at a random position (not first).
  visit.splice(1 + Math.floor(Math.random() * visit.length), 0, sun);
  return visit;
}

function startBeginMotion(toBody) {
  // Capture the just-completed body BEFORE beginMotion clobbers _target,
  // so the old-body marker has a position to render at.
  oldBodyForLhokon = motion._target;
  motion.beginMotion({
    fromPosition: camera.position.clone(),
    toBody,
    bodyRadius: toBody.userData.bodyRadius,
    ship,
    fovDegrees: 70,
  });
}

function startAutoTour() {
  motion.stop();
  oldBodyForLhokon = null;
  tourQueue = shuffleQueue();
  tourIndex = 0;
  startBeginMotion(tourQueue[0]);
}

function manualClick(toBody) {
  // Manual nav — same machinery as auto-tour, just player-triggered.
  // If a tour was running, stop it first so motionComplete doesn't
  // try to advance through tourQueue.
  startBeginMotion(toBody);
}

// ── Click handling (manual mode) ─────────────────────────────────────
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
canvas.addEventListener('click', (e) => {
  if (mode !== 'manual') return;
  const rect = canvas.getBoundingClientRect();
  mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
  mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(bodies, false);
  if (hits.length > 0) manualClick(hits[0].object);
});

// ── UI wiring ────────────────────────────────────────────────────────
const $ = (id) => document.getElementById(id);

// Map the linear 0–100 dot slider to a perceptually useful range:
// 0 → 0.99 (loose), 50 → 0.9999 (production), 100 → 0.999999 (very tight).
// Use log-spaced via 1 - 10^(-(2 + 4·s/100)).
function dotSliderToValue(s) {
  const exp = 2 + (s / 100) * 4;
  return 1 - Math.pow(10, -exp);
}
function dotValueToSlider(v) {
  const exp = -Math.log10(1 - v);
  return Math.max(0, Math.min(100, ((exp - 2) / 4) * 100));
}

$('dot').addEventListener('input', (e) => {
  const v = dotSliderToValue(parseFloat(e.target.value));
  motion.lhokonDotThreshold = v;
  $('dot-v').textContent = v.toFixed(6);
});
$('timeout').addEventListener('input', (e) => {
  const v = parseFloat(e.target.value);
  motion.lhokonTimeoutSec = v;
  $('timeout-v').textContent = v.toFixed(2);
});
const easeFns = {
  'smoothstep': (t) => t * t * (3 - 2 * t),
  'cubic-out': (t) => 1 - Math.pow(1 - t, 3),
  'sin':       (t) => 0.5 * (1 - Math.cos(Math.PI * t)),
  'quintic':   (t) => t * t * t * (t * (t * 6 - 15) + 10),
  'linear':    (t) => t,
};
$('ease').addEventListener('change', (e) => {
  motion.lhokonEaseFn = easeFns[e.target.value];
});
$('show-old').addEventListener('change', (e) => {
  if (!e.target.checked) oldBodyMarker.visible = false;
});
$('show-lines').addEventListener('change', (e) => {
  if (!e.target.checked) [lineLook, lineOld, lineNew].forEach(l => l.visible = false);
});
$('orbit-bodies').addEventListener('change', (e) => {
  bodiesOrbit = e.target.checked;
});
$('mode-auto').addEventListener('click', () => {
  mode = 'auto';
  $('mode-auto').classList.add('active');
  $('mode-manual').classList.remove('active');
  startAutoTour();
});
$('mode-manual').addEventListener('click', () => {
  mode = 'manual';
  $('mode-manual').classList.add('active');
  $('mode-auto').classList.remove('active');
  motion.stop();
  oldBodyForLhokon = null;
});
$('reset').addEventListener('click', () => {
  motion.stop();
  oldBodyForLhokon = null;
  oldBodyMarker.visible = false;
  [lineLook, lineOld, lineNew].forEach(l => l.visible = false);
  camera.position.set(2500, 600, 2500);
  camera.lookAt(0, 0, 0);
  if (mode === 'auto') startAutoTour();
});

// Initialize slider display value to the actual default.
$('dot').value = dotValueToSlider(motion.lhokonDotThreshold);
$('dot-v').textContent = motion.lhokonDotThreshold.toFixed(6);
$('timeout').value = motion.lhokonTimeoutSec;
$('timeout-v').textContent = motion.lhokonTimeoutSec.toFixed(2);

// ── Main loop ────────────────────────────────────────────────────────
const clock = new THREE.Clock();
const _lookEnd = new THREE.Vector3();
const _oldEnd = new THREE.Vector3();
const _newEnd = new THREE.Vector3();

function tickOrbits(dt) {
  if (!bodiesOrbit) return;
  for (const b of bodies) {
    const p = b.userData.parent;
    if (!p) continue;
    b.userData.orbitAngle += b.userData.orbitSpeed * dt;
    const r = b.userData.orbitRadius;
    const a = b.userData.orbitAngle;
    b.position.set(p.position.x + r * Math.cos(a), p.position.y, p.position.z + r * Math.sin(a));
  }
}

function frame() {
  const dt = Math.min(0.05, clock.getDelta()); // cap dt to avoid spurious jumps after tab pause
  tickOrbits(dt);

  if (motion.isActive) {
    const f = motion.update(dt);
    camera.position.copy(f.position);
    cameraChoreographer.update(dt, f);
    camera.lookAt(cameraChoreographer.currentLookAtTarget);

    // Auto-tour leg advance.
    if (mode === 'auto' && f.motionComplete) {
      tourIndex = (tourIndex + 1) % tourQueue.length;
      // Rebuild + reshuffle when wrapping.
      if (tourIndex === 0) tourQueue = shuffleQueue();
      startBeginMotion(tourQueue[tourIndex]);
    }
  }

  // Visual aids — old-body marker + direction lines, only during lhokon.
  const phase = motion._phase;
  const showOld = $('show-old').checked;
  const showLines = $('show-lines').checked;
  oldBodyMarker.visible = showOld && phase === 'lhokon' && oldBodyForLhokon != null;
  if (oldBodyMarker.visible) oldBodyMarker.position.copy(oldBodyForLhokon.position);

  if (showLines && phase === 'lhokon') {
    // yellow: ship → current camera look point (where camera IS pointed)
    _lookEnd.copy(cameraChoreographer.currentLookAtTarget);
    setLineEndpoints(lineLook, camera.position, _lookEnd);
    // red: ship → old body position (where camera WAS pointed at lhokon onset)
    if (oldBodyForLhokon) {
      _oldEnd.copy(oldBodyForLhokon.position);
      setLineEndpoints(lineOld, camera.position, _oldEnd);
    } else { lineOld.visible = false; }
    // green: ship → new target (where camera is converging to)
    if (motion._target) {
      _newEnd.copy(motion._target.position);
      setLineEndpoints(lineNew, camera.position, _newEnd);
    } else { lineNew.visible = false; }
  } else {
    [lineLook, lineOld, lineNew].forEach(l => l.visible = false);
  }

  // HUD.
  const tgt = motion._target?.userData?.name ?? '—';
  const dot = motion._cameraLookDir && motion._target
    ? (() => {
        const d = new THREE.Vector3().subVectors(motion._target.position, motion._position);
        const len = d.length();
        if (len < 1e-6) return 1;
        d.divideScalar(len);
        return motion._cameraLookDir.dot(d);
      })()
    : 1;
  $('hud').innerHTML = `
    <span class="label">phase</span> <span class="phase-${phase}">${phase}</span><br>
    <span class="label">target</span> ${tgt}<br>
    <span class="label">lhokon elapsed</span> ${motion._lhokonElapsed.toFixed(3)}s<br>
    <span class="label">lhokon timeout</span> ${motion._lhokonTimeoutFlag ? 'FIRED ⚠' : 'no'}<br>
    <span class="label">dot(camera, target)</span> ${dot.toFixed(6)}<br>
    <span class="label">cruiseDir</span> (${motion._cruiseDir.x.toFixed(2)}, ${motion._cruiseDir.y.toFixed(2)}, ${motion._cruiseDir.z.toFixed(2)})<br>
    <span class="label">lookDir</span> (${motion._cameraLookDir.x.toFixed(2)}, ${motion._cameraLookDir.y.toFixed(2)}, ${motion._cameraLookDir.z.toFixed(2)})<br>
    <span class="label">ship pos</span> (${motion._position.x.toFixed(0)}, ${motion._position.y.toFixed(0)}, ${motion._position.z.toFixed(0)})
  `;

  renderer.render(scene, camera);
  requestAnimationFrame(frame);
}

// Kick off — auto tour by default.
startAutoTour();
requestAnimationFrame(frame);

// Expose for live inspection.
window.__lab = { motion, cameraChoreographer, camera, scene, bodies, ship,
  setMode: (m) => $(m === 'manual' ? 'mode-manual' : 'mode-auto').click() };
</script>
</body>
</html>
