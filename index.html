<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Well Dipper</title>
  </head>
  <body>
    <canvas id="canvas"></canvas>

    <!-- Portrait overlay: shown on mobile when device is in portrait mode -->
    <div id="portrait-overlay">
      <div class="portrait-msg">&#x21BB;<br>Rotate your device</div>
    </div>

    <!-- Debug gallery overlay (hidden by default) -->
    <div id="gallery-overlay" style="display:none; position:fixed; top:0; left:0; right:0; padding:16px; z-index:1000; pointer-events:none; font-family:monospace; color:#0f0; text-shadow:0 0 6px #000, 0 0 12px #000, 0 0 20px #000;">
      <div style="font-size:20px; font-weight:bold;">OBJECT GALLERY</div>
      <div id="gallery-info" style="font-size:14px; margin-top:4px;"></div>
      <div style="font-size:12px; margin-top:8px; color:#0a0;">
        ←/→ cycle seeds &nbsp; ↑/↓ cycle types &nbsp; drag to orbit &nbsp; D = exit
      </div>
    </div>

    <!-- Mobile controls menu (hidden on desktop) -->
    <div id="mobile-menu" class="mobile-menu">
      <div class="mobile-menu-items">
        <button data-action="autonav" title="Toggle autopilot">&#x25B7;</button>
        <button data-action="gyro" title="Toggle free-look (gyro)">&#x2B55;</button>
        <button data-action="minimap" title="Toggle minimap">&#x25A3;</button>
        <button data-action="gravity" title="Toggle gravity wells">&#x25C9;</button>
        <button data-action="orbits" title="Toggle orbits">&#x25CE;</button>
        <button data-action="prev" title="Previous planet">&#x25C0;</button>
        <button data-action="next" title="Next planet">&#x25B6;</button>
        <button data-action="back" title="System overview">&#x2190;</button>
        <button data-action="new" title="New system">&#x21BB;</button>
      </div>
      <button class="mobile-menu-toggle" title="Menu">&#x2630;</button>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
